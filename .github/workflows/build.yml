name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up Python 3.11 for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up MSVC dev tools for node-gyp
        uses: microsoft/setup-msbuild@v2
      - name: Configure node-gyp for VS2022
        run: echo "msvs_version=2022" >> .npmrc
      - run: npm ci
      - run: npx tsc
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: Nikxel-Setup-x64
          path: "dist/Nikxel Setup*.exe"
