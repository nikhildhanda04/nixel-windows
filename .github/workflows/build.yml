name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  npm_config_build_from_source: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: Nikxel-Setup-x64
          path: "dist/Nikxel Setup*.exe"
